<!DOCTYPE html>
<html>
<head>

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="card">

    <h2>Create Account</h2>

    <form action="/register" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Create Account
        </button>

    </form>

</div>

</body>
</html>
