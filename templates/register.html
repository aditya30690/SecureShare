<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SecureShare</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">
            ☁
        </div>

        <h1>Create Account</h1>

        <p>
            Join SecureShare Cloud Platform
        </p>

        <form action="/register" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
