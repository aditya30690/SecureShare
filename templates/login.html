<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SecureShare</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">
            ☁
        </div>

        <h1>Welcome Back</h1>

        <p>
            Login to access your cloud files securely
        </p>

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="/register">
                Register
            </a>

        </div>

    </div>

</div>

</body>
</html>
